name: Fuzz Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: ./builtins/tests/head/
            name: head
            corpus_path: builtins/tests/head
          - pkg: ./builtins/tests/cat/
            name: cat
            corpus_path: builtins/tests/cat
          - pkg: ./builtins/tests/wc/
            name: wc
            corpus_path: builtins/tests/wc
          - pkg: ./builtins/tests/tail/
            name: tail
            corpus_path: builtins/tests/tail
          - pkg: ./builtins/tests/grep/
            name: grep
            corpus_path: builtins/tests/grep
          - pkg: ./builtins/tests/cut/
            name: cut
            corpus_path: builtins/tests/cut
          - pkg: ./builtins/tests/echo/
            name: echo
            corpus_path: builtins/tests/echo
          - pkg: ./builtins/tests/uniq/
            name: uniq
            corpus_path: builtins/tests/uniq
          - pkg: ./builtins/tests/strings_cmd/
            name: strings_cmd
            corpus_path: builtins/tests/strings_cmd
          - pkg: ./builtins/tests/testcmd/
            name: testcmd
            corpus_path: builtins/tests/testcmd
          - pkg: ./builtins/tests/ls/
            name: ls
            corpus_path: builtins/tests/ls
          - pkg: ./builtins/tests/ip/
            name: ip
            corpus_path: builtins/tests/ip
          - pkg: ./builtins/tests/ss/
            name: ss
            corpus_path: builtins/tests/ss
          - pkg: ./builtins/ping/
            name: ping
            # ping fuzz tests live in builtins/ping/ rather than builtins/tests/ping/
            # because they share test helper functions (runScriptCtx, etc.) defined in
            # ping_test.go. Go test helpers are only in scope within the same directory,
            # so both files must reside in builtins/ping/.
            corpus_path: builtins/ping
          - pkg: ./interp/tests/
            name: interp
            corpus_path: interp/tests
          - pkg: ./builtins/tests/ps/
            name: ps
            corpus_path: builtins/tests/ps
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: .go-version

      # Restore corpus from previous runs
      - name: Restore fuzz corpus
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ matrix.corpus_path }}/testdata/fuzz/
          key: fuzz-corpus-${{ matrix.name }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.name }}-

      # Run seed corpus as normal tests (fast, deterministic)
      - name: Run fuzz seed corpus
        run: |
          # Find all Fuzz* functions in the package (excluding differential ones that need RSHELL_BASH_TEST)
          FUZZ_FUNCS=$(grep -r '^func Fuzz' ${{ matrix.pkg }} 2>/dev/null | grep -v 'Differential' | sed 's/.*func \(Fuzz[^(]*\).*/\1/' | sort -u | tr '\n' '|' | sed 's/|$//')
          if [ -n "$FUZZ_FUNCS" ]; then
            go test -run "^(${FUZZ_FUNCS})$" ${{ matrix.pkg }} -timeout 120s
          else
            echo "No non-differential fuzz functions found in ${{ matrix.pkg }}, skipping"
          fi

      # Run actual fuzzing for a short duration
      - name: Fuzz (${{ matrix.name }})
        run: |
          FUZZ_FUNCS=$(grep -r '^func Fuzz' ${{ matrix.pkg }} 2>/dev/null | grep -v 'Differential' | sed 's/.*func \(Fuzz[^(]*\).*/\1/' | sort -u)
          if [ -z "$FUZZ_FUNCS" ]; then
            echo "No fuzz targets found in ${{ matrix.pkg }}, skipping"
            exit 0
          fi
          # fuzz_run wraps a single fuzz invocation and treats "context deadline exceeded"
          # at the fuzz time boundary as success. When -fuzztime=30s expires, Go's internal
          # fuzz coordinator cancels any in-flight iteration and emits "context deadline
          # exceeded" with no file:line reference — this is not a real test failure.
          # Real failures always include a file:line reference (e.g. foo_test.go:42:).
          #
          # We use `tee` rather than output=$(...) so that:
          # 1. Progress lines appear in the Actions log in real time (output=$(...) buffers
          #    everything and bash -e exits the function before we ever reach echo "$output").
          # 2. PIPESTATUS[0] captures go test's exit code even when the pipe itself exits 0.
          fuzz_run() {
            local func="$1"
            local tmpfile exit_code
            tmpfile=$(mktemp)
            go test -fuzz="^${func}$" -fuzztime=30s ${{ matrix.pkg }} -timeout 90s 2>&1 | tee "$tmpfile" || true
            exit_code=${PIPESTATUS[0]}
            if [ $exit_code -ne 0 ]; then
              # Check whether any line has a file:line reference (real assertion failure).
              # Coordinator boundary timeouts produce "    context deadline exceeded" with
              # no file:line, so they will NOT match this pattern.
              if grep -qE '[[:space:]]+[^[:space:]]+_test\.go:[0-9]+:' "$tmpfile"; then
                rm -f "$tmpfile"
                echo "FAIL: $func — test assertion failure detected" >&2
                return $exit_code
              fi
              echo "NOTE: $func — fuzz coordinator boundary timeout (expected at fuzz time limit, not a failure)"
            fi
            rm -f "$tmpfile"
            return 0
          }
          for FUNC in $FUZZ_FUNCS; do
            echo "Fuzzing $FUNC..."
            fuzz_run "$FUNC"
          done

      # Save corpus
      - name: Save fuzz corpus
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: always()
        with:
          path: |
            ${{ matrix.corpus_path }}/testdata/fuzz/
          key: fuzz-corpus-${{ matrix.name }}-${{ github.sha }}

  fuzz-differential:
    name: Fuzz Differential (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: ./builtins/tests/head/
            name: head
          - pkg: ./builtins/tests/cat/
            name: cat
          - pkg: ./builtins/tests/wc/
            name: wc
          - pkg: ./builtins/tests/tail/
            name: tail
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: .go-version

      - name: Restore fuzz corpus
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            builtins/tests/${{ matrix.name }}/testdata/fuzz/
          key: fuzz-differential-corpus-${{ matrix.name }}-${{ github.sha }}
          restore-keys: |
            fuzz-differential-corpus-${{ matrix.name }}-

      - name: Fuzz Differential (${{ matrix.name }})
        env:
          RSHELL_BASH_TEST: "1"
        run: |
          FUZZ_FUNCS=$(grep -r '^func Fuzz.*Differential' ${{ matrix.pkg }} 2>/dev/null | sed 's/.*func \(Fuzz[^(]*\).*/\1/' | sort -u)
          if [ -z "$FUZZ_FUNCS" ]; then
            echo "No differential fuzz targets found in ${{ matrix.pkg }}, skipping"
            exit 0
          fi
          # fuzz_run wraps a single fuzz invocation and treats "context deadline exceeded"
          # at the fuzz time boundary as success. When -fuzztime=30s expires, Go's internal
          # fuzz coordinator cancels any in-flight iteration and emits "context deadline
          # exceeded" with no file:line reference — this is not a real test failure.
          # Real failures always include a file:line reference (e.g. foo_test.go:42:).
          #
          # We use `tee` rather than output=$(...) so that:
          # 1. Progress lines appear in the Actions log in real time (output=$(...) buffers
          #    everything and bash -e exits the function before we ever reach echo "$output").
          # 2. PIPESTATUS[0] captures go test's exit code even when the pipe itself exits 0.
          fuzz_run() {
            local func="$1"
            local tmpfile exit_code
            tmpfile=$(mktemp)
            go test -fuzz="^${func}$" -fuzztime=30s ${{ matrix.pkg }} -timeout 90s 2>&1 | tee "$tmpfile" || true
            exit_code=${PIPESTATUS[0]}
            if [ $exit_code -ne 0 ]; then
              # Check whether any line has a file:line reference (real assertion failure).
              # Coordinator boundary timeouts produce "    context deadline exceeded" with
              # no file:line, so they will NOT match this pattern.
              if grep -qE '[[:space:]]+[^[:space:]]+_test\.go:[0-9]+:' "$tmpfile"; then
                rm -f "$tmpfile"
                echo "FAIL: $func — test assertion failure detected" >&2
                return $exit_code
              fi
              echo "NOTE: $func — fuzz coordinator boundary timeout (expected at fuzz time limit, not a failure)"
            fi
            rm -f "$tmpfile"
            return 0
          }
          for FUNC in $FUZZ_FUNCS; do
            echo "Fuzzing $FUNC..."
            fuzz_run "$FUNC"
          done

      - name: Save fuzz corpus
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: always()
        with:
          path: |
            builtins/tests/${{ matrix.name }}/testdata/fuzz/
          key: fuzz-differential-corpus-${{ matrix.name }}-${{ github.sha }}
