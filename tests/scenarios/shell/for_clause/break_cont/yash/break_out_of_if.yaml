# yash: break-p.tst - breaking out of then
description: Break inside an if-then exits the enclosing for loop.
input:
  script: |+
    for i in 1; do
        if true; then break; echo not reached then; fi
        echo not reached
    done
    echo done
expect:
  stdout: |+
    done
  stderr: ""
  exit_code: 0
