# skip: rshell treats non-numeric arg as non-fatal (loop continues, exit 1);
# bash exits the loop and the script with exit code 2.
skip_assert_against_bash: true
description: Break with non-numeric argument prints error to stderr and continues the loop.
input:
  script: |+
    for i in a b c; do
      break abc
    done
expect:
  stdout: ""
  stderr_contains:
    - "break: abc: numeric argument required"
  exit_code: 1
