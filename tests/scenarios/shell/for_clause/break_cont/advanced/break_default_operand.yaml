description: Break without operand defaults to break 1.
input:
  script: |+
    for i in 1; do
        echo in $i
        for j in a; do
            echo in $i $j
            for k in x; do
                echo in $i $j $k
                break
                echo out $i $j $k
            done
            echo out $i $j
        done
        echo out $i
    done
    echo done $?
expect:
  stdout: |+
    in 1
    in 1 a
    in 1 a x
    out 1 a
    out 1
    done 0
  stderr: ""
  exit_code: 0
