# yash: andor-p.tst - exit status of list is from last-executed pipeline
description: Exit status reflects the last-executed pipeline in and-or list.
input:
  script: |+
    true && false
    echo $?
    false && true
    echo $?
    true || false
    echo $?
    false || true
    echo $?
expect:
  stdout: |+
    1
    1
    0
    0
  stderr: ""
  exit_code: 0
