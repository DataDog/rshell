description: Closing bracket as first character in bracket expression matches literally.
setup:
  files:
    - path: "].txt"
      content: ""
    - path: a.txt
      content: ""
    - path: b.txt
      content: ""
input:
  allowed_paths: ["$DIR"]
  script: |+
    echo []ab].txt
expect:
  stdout: |+
    ].txt a.txt b.txt
  stderr: ""
  exit_code: 0
