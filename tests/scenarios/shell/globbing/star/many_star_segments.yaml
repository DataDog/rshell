description: Pattern with many star-separated segments matches files with all required substrings.
setup:
  files:
    - path: a-b-c-d-e-f-g.txt
      content: ""
    - path: a1b2c3d4e5f6g.txt
      content: ""
    - path: abcdefg.txt
      content: ""
    - path: a-b-c.txt
      content: ""
    - path: unrelated.txt
      content: ""
input:
  allowed_paths: ["$DIR"]
  script: |+
    echo a*b*c*d*e*f*g*
expect:
  stdout: |+
    a-b-c-d-e-f-g.txt a1b2c3d4e5f6g.txt abcdefg.txt
  stderr: ""
  exit_code: 0
