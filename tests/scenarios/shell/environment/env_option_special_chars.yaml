description: "Env option variable with special characters in value"
# skip: rshell uses an isolated environment that does not inherit from the parent process
skip_assert_against_bash: true
input:
  interpreter_env:
    SPECIAL: "hello world!@#"
  script: |
    echo "$SPECIAL"
expect:
  stdout: "hello world!@#\n"
  exit_code: 0
