description: "Env option can provide empty-string values"
# skip: rshell uses an isolated environment that does not inherit from the parent process
skip_assert_against_bash: true
input:
  interpreter_env:
    EMPTY_VAR: ""
  script: |
    echo "val=[$EMPTY_VAR]"
expect:
  stdout: "val=[]\n"
  exit_code: 0
