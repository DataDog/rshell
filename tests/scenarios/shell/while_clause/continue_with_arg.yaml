# skip: while loops are intentionally blocked in the restricted shell
skip_assert_against_bash: true
description: Continue with numeric argument in while loop is blocked.
input:
  script: |+
    i=0
    while [ $i -lt 5 ]; do
      i=$((i+1))
      continue 1
    done
expect:
  stdout: ""
  stderr: "while/until loops are not supported\n"
  exit_code: 2
