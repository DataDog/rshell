# Derived from yash while-p.tst - nested while loops
skip_assert_against_bash: true
description: Nested while loops are blocked at the outer loop.
input:
  script: |+
    while true
    do
      while false; do echo inner; done
    done
expect:
  stdout: ""
  stderr: |+
    while/until loops are not supported
  exit_code: 2
