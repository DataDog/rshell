# skip: while loops are intentionally blocked in the restricted shell
skip_assert_against_bash: true
description: Continue inside else branch within while loop is blocked.
input:
  script: |+
    while true; do
      if false; then
        :
      else
        continue
      fi
    done
expect:
  stdout: ""
  stderr: "while/until loops are not supported\n"
  exit_code: 2
