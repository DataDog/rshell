# skip: while loops are intentionally blocked in the restricted shell
skip_assert_against_bash: true
description: Continue in while loop is blocked because while loops are not supported.
input:
  script: |+
    i=0
    while [ $i -lt 5 ]; do
      i=$((i+1))
      continue
      echo unreachable
    done
expect:
  stdout: ""
  stderr: "while/until loops are not supported\n"
  exit_code: 2
