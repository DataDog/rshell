# skip: while/until loops are intentionally blocked in the restricted shell
skip_assert_against_bash: true
description: While loop with continue statement is blocked.
input:
  script: |+
    i=0
    while [ $i -lt 3 ]; do
      i=$((i+1))
      continue
    done
expect:
  stdout: ""
  stderr: "while/until loops are not supported\n"
  exit_code: 2
