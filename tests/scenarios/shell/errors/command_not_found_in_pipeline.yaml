# stderr_contains (not stderr) because bash prefixes errors with "bash: line N:"
# while rshell uses a simpler format. This enables bash comparison testing.
description: Unknown command in a pipeline produces error but pipeline continues.
input:
  allowed_commands: ["echo", "unknown_filter_cmd"]
  script: |+
    echo hello | unknown_filter_cmd
expect:
  stdout: ""
  stderr_contains:
    - "unknown_filter_cmd: command not found"
  exit_code: 127
