# skip: command-not-found error format differs from bash (no script:line prefix)
skip_assert_against_bash: true
description: Unknown command in a pipeline produces error but pipeline continues.
input:
  allowed_commands: ["echo"]
  script: |+
    echo hello | unknown_filter_cmd
expect:
  stdout: ""
  stderr_contains:
    - "command not allowed: unknown_filter_cmd"
  exit_code: 1
