skip_assert_against_bash: true
description: Unknown command after valid command still produces error.
input:
  allowed_commands: ["echo", "no_such_cmd_abc"]
  script: |+
    echo before
    no_such_cmd_abc
    echo after
expect:
  stdout: |+
    before
    after
  stderr: |+
    no_such_cmd_abc: command not found
  exit_code: 0
