# stderr_contains (not stderr) because bash prefixes errors with "bash: line N:"
# while rshell uses a simpler format. This enables bash comparison testing.
description: Command not found in if condition causes else branch to execute.
input:
  allowed_commands: ["echo", "notacmd"]
  script: |+
    if notacmd; then echo yes; else echo no; fi
expect:
  stdout: "no\n"
  stderr_contains: ["notacmd: command not found"]
  exit_code: 0
