# skip: error message format differs from bash
skip_assert_against_bash: true
description: Command not found in if condition causes else branch to execute.
input:
  allowed_commands: ["echo"]
  script: |+
    if notacmd; then echo yes; else echo no; fi
expect:
  stdout: "no\n"
  stderr: "command not allowed: notacmd\n"
  exit_code: 0
