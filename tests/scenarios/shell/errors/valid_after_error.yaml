# stderr_contains (not stderr) because bash prefixes errors with "bash: line N:"
# while rshell uses a simpler format. This enables bash comparison testing.
description: Valid commands execute normally after a command-not-found error.
input:
  allowed_commands: ["echo", "nonexistent_cmd"]
  script: |+
    echo first
    nonexistent_cmd
    echo third
expect:
  stdout: |+
    first
    third
  stderr_contains: ["nonexistent_cmd: command not found"]
  exit_code: 0
