# skip: command-not-found error format differs from bash (no script:line prefix)
skip_assert_against_bash: true
description: Valid commands execute normally after a command-not-allowed error.
input:
  allowed_commands: ["echo"]
  script: |+
    echo first
    nonexistent_cmd
    echo third
expect:
  stdout: |+
    first
    third
  stderr: |+
    nonexistent_cmd: command not allowed
  exit_code: 0
