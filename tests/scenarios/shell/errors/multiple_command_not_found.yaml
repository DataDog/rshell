# stderr_contains (not stderr) because bash prefixes errors with "bash: line N:"
# while rshell uses a simpler format. This enables bash comparison testing.
description: Multiple unknown commands each produce command-not-found errors.
input:
  allowed_commands: ["notacmd1", "notacmd2", "notacmd3"]
  script: |+
    notacmd1
    notacmd2
    notacmd3
expect:
  stdout: ""
  stderr_contains:
    - "notacmd1: command not found"
    - "notacmd2: command not found"
    - "notacmd3: command not found"
  exit_code: 127
