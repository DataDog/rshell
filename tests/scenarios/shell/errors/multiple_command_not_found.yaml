# skip: error message format differs from bash
skip_assert_against_bash: true
description: Multiple unknown commands each produce command-not-allowed errors.
input:
  allowed_commands: []
  script: |+
    notacmd1
    notacmd2
    notacmd3
expect:
  stdout: ""
  stderr: |+
    command not allowed: notacmd1
    command not allowed: notacmd2
    command not allowed: notacmd3
  exit_code: 1
