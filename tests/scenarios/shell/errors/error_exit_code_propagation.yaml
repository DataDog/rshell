# skip: command-not-found error format differs from bash (no script:line prefix)
skip_assert_against_bash: true
description: Exit code from failed command is available in $?.
input:
  allowed_commands: ["echo"]
  script: |+
    nonexistent_cmd_xyz
    echo "$?"
expect:
  stdout: |+
    1
  stderr: |+
    command not allowed: nonexistent_cmd_xyz
  exit_code: 0
