# stderr_contains (not stderr) because bash prefixes errors with "bash: line N:"
# while rshell uses a simpler format. This enables bash comparison testing.
description: Unknown command returns exit code 127.
input:
  allowed_commands: ["no_such_command_xyz"]
  script: |+
    no_such_command_xyz
expect:
  stdout: ""
  stderr_contains: ["no_such_command_xyz: command not found"]
  exit_code: 127
