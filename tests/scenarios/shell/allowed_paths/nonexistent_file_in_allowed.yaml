description: "Non-existent file inside allowed directory returns an error"
# skip: allowed_paths sandbox restriction is an rshell-specific feature not present in bash
skip_assert_against_bash: true
setup:
  files:
    - path: "data/exists.txt"
      content: "here\n"
input:
  script: |
    cat data/missing.txt
  allowed_paths:
    - "data"
expect:
  stderr_contains:
    - "no such file or directory"
  exit_code: 1
