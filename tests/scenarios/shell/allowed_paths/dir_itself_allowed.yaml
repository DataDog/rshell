description: "When $DIR is allowed, all files under the temp directory are accessible"
# skip: allowed_paths sandbox restriction is an rshell-specific feature not present in bash
skip_assert_against_bash: true
setup:
  files:
    - path: "a.txt"
      content: "file a\n"
    - path: "sub/b.txt"
      content: "file b\n"
input:
  script: |
    cat a.txt
    cat sub/b.txt
  allowed_paths:
    - "$DIR"
expect:
  stdout: "file a\nfile b\n"
  exit_code: 0
