# skip: allowed_paths sandbox restriction is an rshell-specific feature not present in bash
skip_assert_against_bash: true
description: Redirect via symlink that escapes allowed dir is blocked by os.Root
setup:
  files:
    - path: secret/data.txt
      content: "secret"
    - path: allowed/escape_link
      symlink: ../secret/data.txt
input:
  allowed_paths: ["allowed"]
  script: |+
    cat < allowed/escape_link
expect:
  stdout: ""
  stderr: "openat escape_link: path escapes from parent\n"
  exit_code: 1
