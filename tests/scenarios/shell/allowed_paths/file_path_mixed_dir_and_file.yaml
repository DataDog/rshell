description: Both a directory and a separate file can be allowed simultaneously
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: |+
        from dir
    - path: single.txt
      content: |+
        from file
input:
  allowed_paths: ["dir", "single.txt"]
  script: |+
    cat dir/a.txt && cat single.txt
expect:
  stdout: |+
    from dir
    from file
  stderr: |+
  exit_code: 0
