description: Sibling file in same directory is blocked when only one file is allowed
skip_assert_against_bash: true
setup:
  files:
    - path: allowed.txt
      content: |+
        ok
    - path: sibling.txt
      content: |+
        secret
input:
  allowed_paths: ["allowed.txt"]
  script: |+
    cat sibling.txt
expect:
  stdout: |+
  stderr: |+
    cat: sibling.txt: open sibling.txt: permission denied
  exit_code: 1
