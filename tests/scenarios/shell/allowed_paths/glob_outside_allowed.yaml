# skip: allowed_paths sandbox restriction is an rshell-specific feature not present in bash
skip_assert_against_bash: true
description: Glob expansion on directory outside allowed paths returns literal pattern
setup:
  files:
    - path: allowed/keep.txt
      content: ""
    - path: secret/a.txt
      content: ""
    - path: secret/b.txt
      content: ""
input:
  allowed_paths: ["allowed"]
  script: |+
    echo secret/*.txt
expect:
  stdout: "secret/*.txt\n"
  stderr: ""
  exit_code: 0
