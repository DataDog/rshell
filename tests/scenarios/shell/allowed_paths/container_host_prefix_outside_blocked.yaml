description: Container symlink to path outside allowed roots is blocked even with host prefix
# skip: container host-prefix symlink resolution is an rshell-specific feature
skip_assert_against_bash: true
containerized: true
setup:
  files:
    - path: host/etc/secret/passwd
      content: "secret\n"
    - path: host/var/log/containers/escape.log
      symlink: /etc/secret/passwd
input:
  allowed_paths: ["host/var/log"]
  script: |+
    cat host/var/log/containers/escape.log
expect:
  stdout: |+
  stderr_contains:
    - "escape.log"
  exit_code: 1
