description: "For loop reading files from allowed path via glob"
# skip: allowed_paths sandbox restriction is an rshell-specific feature not present in bash
skip_assert_against_bash: true
setup:
  files:
    - path: "data/a.txt"
      content: "alpha\n"
    - path: "data/b.txt"
      content: "beta\n"
input:
  script: |
    for f in data/*.txt; do
      cat "$f"
    done
  allowed_paths:
    - "data"
expect:
  stdout: "alpha\nbeta\n"
  exit_code: 0
