description: "Glob pattern with no matches inside allowed path returns literal pattern"
# skip: allowed_paths sandbox restriction is an rshell-specific feature not present in bash
skip_assert_against_bash: true
setup:
  files:
    - path: "data/file.log"
      content: "log\n"
input:
  script: |
    echo data/*.xyz
  allowed_paths:
    - "data"
expect:
  stdout: "data/*.xyz\n"
  exit_code: 0
