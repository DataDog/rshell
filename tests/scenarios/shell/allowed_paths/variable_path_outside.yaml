description: "Variable-expanded file path outside allowed path is blocked"
# skip: allowed_paths sandbox restriction is an rshell-specific feature not present in bash
skip_assert_against_bash: true
setup:
  files:
    - path: "data/ok.txt"
      content: "ok\n"
    - path: "secret/hidden.txt"
      content: "secret\n"
input:
  script: |
    DIR=secret
    FILE=hidden.txt
    cat "$DIR/$FILE"
  allowed_paths:
    - "data"
expect:
  stderr_contains:
    - "permission denied"
  exit_code: 1
