description: "Redirect input from one allowed path and cat from another both work"
# skip: allowed_paths sandbox restriction is an rshell-specific feature not present in bash
skip_assert_against_bash: true
setup:
  files:
    - path: "source/input.txt"
      content: "from redirect\n"
    - path: "files/data.txt"
      content: "from cat\n"
input:
  script: |
    cat < source/input.txt
    cat files/data.txt
  allowed_paths:
    - "source"
    - "files"
expect:
  stdout: "from redirect\nfrom cat\n"
  exit_code: 0
