skip_assert_against_bash: true
description: Shell keywords (if/else, pipes, &&/||) still work with restricted commands
input:
  allowed_commands: ["echo", "true", "false"]
  script: |+
    if true; then echo yes; else echo no; fi
    false || echo fallback
    true && echo chained
    echo piped | echo end
expect:
  stdout: "yes\nfallback\nchained\nend\n"
  stderr: ""
  exit_code: 0
