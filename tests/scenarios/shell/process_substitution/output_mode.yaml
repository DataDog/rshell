description: Output process substitution >(cmd) returns a /dev/fd/N path.
skip_assert_against_bash: true
input:
  script: |+
    echo >(true)
expect:
  stdout_contains: ["/dev/fd/"]
  exit_code: 0
  # On Windows, process substitution is not supported, so the error is printed
  # and stdout is empty. stdout_contains_windows overrides stdout_contains.
  stdout_contains_windows: [""]
  stderr_contains_windows: ["process substitution is not supported on this platform"]
