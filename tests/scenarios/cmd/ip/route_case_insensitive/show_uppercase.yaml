# ip route GET (uppercase, no address) exits 1 — the uppercase subcommand is accepted
# (case-insensitive matching is an intentional divergence from real ip, which is case-sensitive).
description: ip route uppercase subcommand (GET) is accepted (intentional divergence from bash).
input:
  script: |+
    ip route GET
expect:
  stdout: ""
  stderr: "ip: route get: missing address argument\n"
  exit_code: 1
skip_assert_against_bash: true
