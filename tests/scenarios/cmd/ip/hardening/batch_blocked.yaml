# GTFOBins: ip -batch FILE / ip -B FILE reads and executes ip commands from a file.
# These flags must be rejected; pflag will reject -b and -B as unknown flags.
# ip is not a standard coreutils command; scenarios test behavior unique to this builtin.
description: "ip -b (batch mode) is rejected as unknown flag (GTFOBins file-read vector)"
input:
  script: |+
    ip -b /tmp/cmds addr show
expect:
  stderr_contains: ["ip:"]
  exit_code: 1
skip_assert_against_bash: true
