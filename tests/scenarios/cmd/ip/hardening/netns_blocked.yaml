# GTFOBins: ip netns exec spawns a shell — must be rejected with exit 1.
# ip is not a standard coreutils command; scenarios test behavior unique to this builtin.
description: "ip netns is blocked (GTFOBins shell escape vector)"
input:
  script: |+
    ip netns exec mynamespace sh
expect:
  stderr_contains: ["blocked"]
  exit_code: 1
skip_assert_against_bash: true
