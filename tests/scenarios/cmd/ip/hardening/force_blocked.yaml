# GTFOBins: ip --force / ip -force is used with -batch for error suppression.
# Must be rejected as unknown flag.
# ip is not a standard coreutils command; scenarios test behavior unique to this builtin.
description: "ip --force is rejected as unknown flag (GTFOBins companion to -batch)"
input:
  script: |+
    ip --force addr show
expect:
  stderr: "ip: unknown flag: --force\n"
  exit_code: 1
skip_assert_against_bash: true
