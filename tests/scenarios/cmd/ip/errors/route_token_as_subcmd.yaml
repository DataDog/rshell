# ip route <non-subcommand-token> (e.g. "from") is treated as an unknown
# subcommand, not as an unsupported argument to show. This is because the first
# token after "route" is always interpreted as the subcommand name.
description: ip route <non-subcommand-token> exits 1 with unknown subcommand error.
input:
  script: |+
    ip route from 1.1.1.1
expect:
  stdout: ""
  stderr: |+
    ip: route: from: unknown subcommand
  exit_code: 1
skip_assert_against_bash: true
