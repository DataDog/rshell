# ip route get with unsupported trailing arguments exits 1.
description: ip route get with unsupported trailing arguments exits 1.
input:
  script: |+
    ip route get 8.8.8.8 from 10.0.0.5
expect:
  stdout: ""
  stderr_contains: ["unsupported argument"]
  exit_code: 1
skip_assert_against_bash: true
