# Unknown object name should fail with exit 1 and an informative error.
# ip is not a standard coreutils command; scenarios test behavior unique to this builtin.
description: "ip with unknown object exits 1 with error message"
input:
  script: |+
    ip foobar
expect:
  stderr: "ip: object \"foobar\" is not supported\nSupported objects: addr, link\n"
  exit_code: 1
skip_assert_against_bash: true
