# ip addr flush is a write operation that must be rejected with exit 1.
# ip is not a standard coreutils command; scenarios test behavior unique to this builtin.
description: "ip addr flush is blocked (write operation)"
input:
  script: |+
    ip addr flush dev lo
expect:
  stderr_contains: ["not supported", "blocked"]
  exit_code: 1
skip_assert_against_bash: true
