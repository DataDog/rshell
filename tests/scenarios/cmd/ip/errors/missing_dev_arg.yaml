# "ip addr show dev" with no interface name should fail with exit 1.
# ip is not a standard coreutils command; scenarios test behavior unique to this builtin.
description: "'ip addr show dev' without an interface name exits 1"
input:
  script: |+
    ip addr show dev
expect:
  stderr_contains: ["requires an interface name"]
  exit_code: 1
skip_assert_against_bash: true
