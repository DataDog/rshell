# ip -o addr show - oneline format: verify backslash continuation and inet content.
# Uses no dev filter so it works cross-platform (lo on Linux, lo0 on macOS).
# ip is not a standard coreutils command; scenarios test behavior unique to this builtin.
description: "ip -o addr show outputs one record per address with backslash continuation"
input:
  script: |+
    ip -o addr show
expect:
  stdout_contains: ["inet 127.0.0.1", "valid_lft forever"]
  exit_code: 0
skip_assert_against_bash: true
