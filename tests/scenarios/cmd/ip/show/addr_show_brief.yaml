# ip --brief addr show - tabular format: verify brief output includes 127.0.0.1.
# Uses no dev filter so it works cross-platform (lo on Linux, lo0 on macOS).
# ip is not a standard coreutils command; scenarios test behavior unique to this builtin.
description: "ip --brief addr show outputs compact tabular format including 127.0.0.1"
input:
  script: |+
    ip --brief addr show
expect:
  stdout_contains: ["127.0.0.1"]
  exit_code: 0
skip_assert_against_bash: true
