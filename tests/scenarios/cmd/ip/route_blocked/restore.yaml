# ip route restore is a write operation and must be blocked.
description: ip route restore is a write operation that is rejected with exit 1.
input:
  script: |+
    ip route restore 10.0.0.0/8 via 192.168.1.1
expect:
  stdout: ""
  stderr_contains: ["write operations are not permitted"]
  exit_code: 1
skip_assert_against_bash: true
