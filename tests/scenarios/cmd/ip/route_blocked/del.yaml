# ip route del is a write operation and must be blocked.
description: ip route del is a write operation that is rejected with exit 1.
input:
  script: |+
    ip route del 10.0.0.0/8 via 192.168.1.1
expect:
  stdout: ""
  stderr: "ip: route: del: write operations are not permitted\n"
  exit_code: 1
skip_assert_against_bash: true
