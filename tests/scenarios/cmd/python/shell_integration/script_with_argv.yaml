description: positional arguments after the script name are passed as sys.argv[1:].
skip_assert_against_bash: true
setup:
  files:
    - path: args.py
      content: |+
        import sys
        for arg in sys.argv[1:]:
            print(arg)
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    python args.py alpha beta gamma
expect:
  stdout: |+
    alpha
    beta
    gamma
  stderr: |+
  exit_code: 0
