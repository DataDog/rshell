description: python script computes Fibonacci numbers using recursion.
skip_assert_against_bash: true
setup:
  files:
    - path: fib.py
      content: |+
        def fib(n):
            if n <= 1:
                return n
            return fib(n - 1) + fib(n - 2)

        for i in range(8):
            print(fib(i))
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    python fib.py
expect:
  stdout: |+
    0
    1
    1
    2
    3
    5
    8
    13
  stderr: |+
  exit_code: 0
