description: python chained comparisons evaluate multiple comparisons without repeating operands.
skip_assert_against_bash: true
setup:
  files:
    - path: chained.py
      content: |+
        x = 5
        print(1 < x < 10)
        print(1 < x < 4)
        print(0 <= x <= 5)
        print(1 < 2 < 3 < 4)
        print(1 == 1 == 2)
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    python chained.py
expect:
  stdout: |+
    True
    False
    True
    True
    False
  stderr: |+
  exit_code: 0
