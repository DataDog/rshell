description: python executes for loops over a range.
skip_assert_against_bash: true
setup:
  files:
    - path: loop.py
      content: |+
        for i in range(1, 4):
            print(i)
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    python loop.py
expect:
  stdout: |+
    1
    2
    3
  stderr: |+
  exit_code: 0
