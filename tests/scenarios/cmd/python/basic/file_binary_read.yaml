description: open() in binary mode ('rb') reads file content without error.
skip_assert_against_bash: true
setup:
  files:
    - path: data.bin
      content: "hello"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    python -c "f = open('data.bin', 'rb'); f.read(); f.close(); print('ok')"
expect:
  stdout: |+
    ok
  stderr: |+
  exit_code: 0
