description: python supports dict creation, key access, and mutation.
skip_assert_against_bash: true
setup:
  files:
    - path: dicts.py
      content: |+
        d = {'name': 'rshell', 'version': 1}
        print(d['name'])
        print(d['version'])
        d['extra'] = 'ok'
        print(len(d))
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    python dicts.py
expect:
  stdout: |+
    rshell
    1
    3
  stderr: |+
  exit_code: 0
