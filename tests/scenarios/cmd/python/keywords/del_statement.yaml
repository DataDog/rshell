description: python del statement removes variables and list elements.
skip_assert_against_bash: true
setup:
  files:
    - path: del.py
      content: |+
        x = 42
        del x
        try:
            print(x)
        except NameError:
            print("x deleted")
        lst = [1, 2, 3]
        del lst[1]
        print(lst)
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    python del.py
expect:
  stdout: |+
    x deleted
    [1, 3]
  stderr: |+
  exit_code: 0
