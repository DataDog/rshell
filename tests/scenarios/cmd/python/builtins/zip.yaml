description: python zip() pairs up elements from multiple iterables element-wise.
skip_assert_against_bash: true
setup:
  files:
    - path: zip.py
      content: |+
        names = ["Alice", "Bob", "Charlie"]
        scores = [95, 87, 92]
        for name, score in zip(names, scores):
            print(name, score)
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    python zip.py
expect:
  stdout: |+
    Alice 95
    Bob 87
    Charlie 92
  stderr: |+
  exit_code: 0
