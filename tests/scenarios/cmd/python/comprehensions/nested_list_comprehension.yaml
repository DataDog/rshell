description: python nested list comprehension flattens a 2D matrix into a 1D list.
skip_assert_against_bash: true
input:
  script: |+
    python -c "matrix = [[1, 2, 3], [4, 5, 6], [7, 8, 9]]; flat = [x for row in matrix for x in row]; print(flat)"
expect:
  stdout: |+
    [1, 2, 3, 4, 5, 6, 7, 8, 9]
  stderr: |+
  exit_code: 0
