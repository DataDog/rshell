description: tail -n with a value that overflows int64 but fits in uint64 is clamped and succeeds (GNU tail behavior).
setup:
  files:
    - path: file.txt
      content: "hello\nworld\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    tail -n 9223372036854775808 file.txt
expect:
  stdout: "hello\nworld\n"
  stderr: ""
  exit_code: 0
