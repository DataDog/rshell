description: tail -n -K (negative bare suffix) is accepted as abs(-1K) = 1024 lines (GNU tail behavior).
setup:
  files:
    - path: file.txt
      content: "hello\nworld\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    tail -n -K file.txt
expect:
  stdout: "hello\nworld\n"
  stderr: ""
  exit_code: 0
