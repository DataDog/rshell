description: tail reads from stdin when '-' is given as the file argument.
setup:
  files:
    - path: src.txt
      content: "alpha\nbeta\ngamma\ndelta\nepsilon\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    tail -n 2 - < src.txt
expect:
  stdout: "delta\nepsilon\n"
  stderr: ""
  exit_code: 0
