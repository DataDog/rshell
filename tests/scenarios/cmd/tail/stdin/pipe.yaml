description: tail works correctly in a pipeline.
setup:
  files:
    - path: file.txt
      content: "line01\nline02\nline03\nline04\nline05\nline06\nline07\nline08\nline09\nline10\nline11\nline12\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    cat file.txt | tail -n 3
expect:
  stdout: "line10\nline11\nline12\n"
  stderr: ""
  exit_code: 0
