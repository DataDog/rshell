# --follow/-f is not supported; rshell rejects it as an unknown flag.
description: tail rejects --follow as an unsupported flag.
skip_assert_against_bash: true
setup:
  files:
    - path: file.txt
      content: "hello\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    tail --follow file.txt
expect:
  stdout: ""
  stderr_contains: ["tail:"]
  exit_code: 1
