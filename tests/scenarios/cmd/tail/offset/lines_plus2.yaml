description: tail -n +2 skips the first line and outputs the rest.
setup:
  files:
    - path: file.txt
      content: "alpha\nbeta\ngamma\ndelta\nepsilon\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    tail -n +2 file.txt
expect:
  stdout: "beta\ngamma\ndelta\nepsilon\n"
  stderr: ""
  exit_code: 0
