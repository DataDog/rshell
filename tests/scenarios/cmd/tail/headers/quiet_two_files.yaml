description: tail -q suppresses headers even when multiple files are given.
setup:
  files:
    - path: a.txt
      content: "alpha\nbeta\n"
    - path: b.txt
      content: "gamma\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    tail -q -n 2 a.txt b.txt
expect:
  stdout: "alpha\nbeta\ngamma\n"
  stderr: ""
  exit_code: 0
