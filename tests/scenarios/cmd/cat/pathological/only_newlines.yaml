description: cat passes through a file consisting entirely of newlines verbatim.
setup:
  files:
    - path: newlines.txt
      content: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    cat newlines.txt
expect:
  stdout: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
  stderr: ""
  exit_code: 0
