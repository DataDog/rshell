description: sort -c exits 1 and prints disorder diagnostic when input is not sorted.
setup:
  files:
    - path: file.txt
      content: "b\na\nc\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sort -c file.txt
expect:
  stdout: ""
  stderr_contains: ["disorder"]
  exit_code: 1
skip_assert_against_bash: true  # disorder message format differs slightly
