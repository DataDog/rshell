description: "sort rejects incompatible per-key flag combinations."
setup:
  files:
    - path: data.txt
      content: "a\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sort -k 1nd data.txt
expect:
  stdout: ""
  stderr: "sort: options '-dn' are incompatible\n"
  exit_code: 2
  skip_assert_against_bash: true
