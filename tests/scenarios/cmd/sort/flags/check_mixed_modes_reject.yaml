description: "sort rejects mixed diagnose/silent check modes."
setup:
  files:
    - path: data.txt
      content: "a\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sort -c --check=silent data.txt
expect:
  stdout: ""
  stderr: "sort: options '-cC' are incompatible\n"
  exit_code: 2
  skip_assert_against_bash: true
