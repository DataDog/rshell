description: strings -t d prints decimal byte offset before each string, right-justified in 7 chars.
skip_assert_against_bash: true
setup:
  files:
    - path: data.bin
      content: "hello_here\nworld_too\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    strings -t d data.bin
expect:
  stdout: "      0 hello_here\n     11 world_too\n"
  stderr: ""
  exit_code: 0
