description: strings -t with an invalid radix character prints an error and exits 1.
# skip: rshell builtin error/output format differs from GNU coreutils
skip_assert_against_bash: true  # GNU strings uses different error/usage format for invalid flags
setup:
  files:
    - path: data.bin
      content: "hello\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    strings -t z data.bin
expect:
  stdout: ""
  stderr: "strings: invalid argument \"z\" for \"-t, --radix\" flag: invalid radix\n"
  exit_code: 1
