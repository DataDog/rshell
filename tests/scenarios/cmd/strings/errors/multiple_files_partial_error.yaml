description: strings processes valid files and reports errors for missing ones; exits 1.
skip_assert_against_bash: true  # GNU strings uses different error message format
setup:
  files:
    - path: good.bin
      content: |+
        hello
input:
  allowed_paths: ["$DIR"]
  script: |+
    strings good.bin missing.bin
expect:
  stdout: |+
    hello
  stderr_contains:
    - "strings: missing.bin:"
  exit_code: 1
