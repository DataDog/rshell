description: strings on a file containing a single printable run of 5000 bytes (far beyond the default 4096-byte read chunk boundary) emits the entire string as one output line.
setup:
  files:
    - path: file.bin
      content: "\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    strings file.bin
expect:
  stdout: "\n"
  stderr: ""
  exit_code: 0
