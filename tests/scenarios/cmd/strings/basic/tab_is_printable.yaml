description: strings treats horizontal tab as a printable character within a sequence.
skip_assert_against_bash: true
setup:
  files:
    - path: data.bin
      content: "col1\tcol2\nother\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    strings data.bin
expect:
  stdout: "col1\tcol2\nother\n"
  stderr: ""
  exit_code: 0
