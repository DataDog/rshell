description: ls -r --limit returns the correct number of entries in reverse sort order.
skip_assert_against_bash: true
setup:
  files:
    - path: f01
      content: ""
      chmod: 0644
    - path: f02
      content: ""
      chmod: 0644
    - path: f03
      content: ""
      chmod: 0644
    - path: f04
      content: ""
      chmod: 0644
    - path: f05
      content: ""
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls -r --limit 3 | wc -l | tr -d ' '
expect:
  stdout: |+
    3
  stderr: ""
  exit_code: 0
