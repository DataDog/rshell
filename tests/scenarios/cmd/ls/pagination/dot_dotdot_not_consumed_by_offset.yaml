description: ls -a --offset does not skip . and .. (they are synthesized after pagination).
skip_assert_against_bash: true
setup:
  files:
    - path: f01
      content: ""
      chmod: 0644
    - path: f02
      content: ""
      chmod: 0644
    - path: f03
      content: ""
      chmod: 0644
    - path: f04
      content: ""
      chmod: 0644
    - path: f05
      content: ""
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls -a --offset 3 --limit 2 | wc -l | tr -d ' '
expect:
  stdout: |+
    4
  stderr: ""
  exit_code: 0
