description: ls --offset and --limit together paginate results.
skip_assert_against_bash: true
setup:
  files:
    - path: f01
      content: ""
      chmod: 0644
    - path: f02
      content: ""
      chmod: 0644
    - path: f03
      content: ""
      chmod: 0644
    - path: f04
      content: ""
      chmod: 0644
    - path: f05
      content: ""
      chmod: 0644
    - path: f06
      content: ""
      chmod: 0644
    - path: f07
      content: ""
      chmod: 0644
    - path: f08
      content: ""
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls --offset 2 --limit 3 | wc -l | tr -d ' '
expect:
  stdout: |+
    3
  stderr: ""
  exit_code: 0
