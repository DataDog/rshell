description: Negative --limit is clamped to zero (shows all entries).
skip_assert_against_bash: true
setup:
  files:
    - path: f01
      content: ""
      chmod: 0644
    - path: f02
      content: ""
      chmod: 0644
    - path: f03
      content: ""
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls --limit -1
expect:
  stdout: |+
    f01
    f02
    f03
  stderr: ""
  exit_code: 0
