description: ls -R silently ignores --limit.
skip_assert_against_bash: true
setup:
  files:
    - path: aaa/file.txt
      content: ""
      chmod: 0644
    - path: bbb/file.txt
      content: ""
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls -R --limit 1
expect:
  stdout: |+
    .:
    aaa
    bbb

    ./aaa:
    file.txt

    ./bbb:
    file.txt
  stderr: ""
  exit_code: 0
