description: --offset 0 --limit 0 behaves like no pagination.
# skip: pagination flags are an rshell-specific extension not present in GNU coreutils
skip_assert_against_bash: true
setup:
  files:
    - path: f01
      content: ""
      chmod: 0644
    - path: f02
      content: ""
      chmod: 0644
    - path: f03
      content: ""
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls --offset 0 --limit 0
expect:
  stdout: |+
    f01
    f02
    f03
  stderr: ""
  exit_code: 0
