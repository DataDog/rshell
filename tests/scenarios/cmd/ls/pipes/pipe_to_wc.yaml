description: ls piped to wc -l counts the number of entries.
skip_assert_against_bash: true
setup:
  files:
    - path: a.txt
      content: "a"
      chmod: 0644
    - path: b.txt
      content: "b"
      chmod: 0644
    - path: c.txt
      content: "c"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls | wc -l
expect:
  stdout: "3\n"
  stderr: ""
  exit_code: 0
