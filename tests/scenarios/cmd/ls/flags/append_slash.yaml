description: ls -p appends / to directories.
setup:
  files:
    - path: subdir/file.txt
      content: "hello"
      chmod: 0644
    - path: regular.txt
      content: "hello"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls -p
expect:
  stdout: |+
    regular.txt
    subdir/
  stderr: ""
  exit_code: 0
