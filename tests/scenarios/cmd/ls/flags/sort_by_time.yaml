description: ls -t sorts by modification time, newest first.
skip_assert_against_bash: true
setup:
  files:
    - path: old.txt
      content: "old"
      chmod: 0644
    - path: new.txt
      content: "new"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls -t
expect:
  stdout: |
    new.txt
    old.txt
  stderr: ""
  exit_code: 0
