description: ls outside allowed_paths returns permission denied.
skip_assert_against_bash: true
setup:
  files:
    - path: inside.txt
      content: "ok"
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls /etc
expect:
  stdout: ""
  stderr: "ls: cannot access '/etc': permission denied\n"
  # On Windows, /etc is not an absolute path (no drive letter), so it resolves
  # to <cwd>/etc inside the sandbox — yielding "no such file or directory"
  # instead of "permission denied".
  stderr_windows: "ls: cannot access '/etc': no such file or directory\n"
  exit_code: 1
