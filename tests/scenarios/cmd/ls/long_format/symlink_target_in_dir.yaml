description: ls -l in a directory shows symlink targets with -> arrow
# skip: rshell displays numeric UID/GID while GNU ls resolves usernames.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/file.txt
      content: "hello"
      chmod: 0644
    - path: dir/link.txt
      symlink: file.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    ls -l dir/
expect:
  stdout_contains:
    - "link.txt -> file.txt"
    - "file.txt"
  stderr: ""
  exit_code: 0
