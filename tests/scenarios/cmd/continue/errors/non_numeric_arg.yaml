# skip: rshell treats non-numeric arg as non-fatal (Code 1, loop continues);
# bash exits the loop with exit code 2.
skip_assert_against_bash: true
description: continue with non-numeric argument prints error to stderr, exits 1, and loop continues.
input:
  script: |+
    for i in 1 2 3; do
      continue abc
      echo "after: $?"
    done
    echo done
expect:
  stdout: |+
    after: 1
    after: 1
    after: 1
    done
  stderr: |+
    continue: abc: numeric argument required
    continue: abc: numeric argument required
    continue: abc: numeric argument required
  exit_code: 0
