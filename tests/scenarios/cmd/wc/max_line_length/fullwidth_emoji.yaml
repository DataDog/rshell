description: wc -L counts display columns, emoji characters are width 2.
# skip: rshell builtin error/output format differs from GNU coreutils
skip_assert_against_bash: true  # display width depends on locale; we always use Unicode width
setup:
  files:
    - path: file.txt
      content: "ab💐\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    wc -L file.txt
expect:
  stdout: "4 file.txt\n"
  stderr: ""
  exit_code: 0
