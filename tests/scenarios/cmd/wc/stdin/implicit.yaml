# Derived from standard POSIX wc behavior
description: wc reads stdin implicitly when no files are given.
setup:
  files:
    - path: file.txt
      content: "a b\nc\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    cat file.txt | wc
expect:
  stdout: "      2       3       6\n"
  stderr: ""
  exit_code: 0
