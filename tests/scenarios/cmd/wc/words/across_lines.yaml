# Derived from GNU coreutils wc.pl test a6
description: wc -w counts words across lines including a line without trailing newline.
setup:
  files:
    - path: file.txt
      content: "x y\nz"
input:
  allowed_paths: ["$DIR"]
  script: |+
    wc -w file.txt
expect:
  stdout: "3 file.txt\n"
  stderr: ""
  exit_code: 0
