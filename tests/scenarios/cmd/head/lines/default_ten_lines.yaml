description: head outputs exactly 10 lines by default when file has more than 10.
setup:
  files:
    - path: file.txt
      content: "line01\nline02\nline03\nline04\nline05\nline06\nline07\nline08\nline09\nline10\nline11\nline12\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    head file.txt
expect:
  stdout: "line01\nline02\nline03\nline04\nline05\nline06\nline07\nline08\nline09\nline10\n"
  stderr: ""
  exit_code: 0
