# Derived from GNU coreutils head.pl basic tests
description: head --lines=N long form is equivalent to -n N.
setup:
  files:
    - path: file.txt
      content: "alpha\nbeta\ngamma\ndelta\nepsilon\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    head --lines=3 file.txt
expect:
  stdout: "alpha\nbeta\ngamma\n"
  stderr: ""
  exit_code: 0
