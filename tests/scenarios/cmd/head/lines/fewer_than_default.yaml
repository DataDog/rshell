# Derived from GNU coreutils head.pl test basic-09
description: head outputs all lines when file has fewer than 10.
setup:
  files:
    - path: file.txt
      content: "alpha\nbeta\ngamma\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    head file.txt
expect:
  stdout: "alpha\nbeta\ngamma\n"
  stderr: ""
  exit_code: 0
