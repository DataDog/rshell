description: head -3 (bare numeric shorthand) outputs the first 3 lines, equivalent to head -n 3.
setup:
  files:
    - path: file.txt
      content: "alpha\nbeta\ngamma\ndelta\nepsilon\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    head -3 file.txt
expect:
  stdout: "alpha\nbeta\ngamma\n"
  stderr: ""
  exit_code: 0
