# Derived from uutils test_head.rs::test_multiple_nonexistent_files
description: All nonexistent files each produce an error message; no headers are printed.
input:
  allowed_paths: ["$DIR"]
  script: |+
    head missing1.txt missing2.txt
expect:
  stdout: ""
  stderr_contains:
    - "missing1.txt"
    - "missing2.txt"
  exit_code: 1
