# Derived from GNU coreutils head.pl tests
description: head --bytes=N long form is equivalent to -c N.
skip_assert_against_bash: true  # --bytes= is a GNU extension; BusyBox head (bash:5.2 image) only supports -c
setup:
  files:
    - path: file.txt
      content: "alpha\nbeta\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    head --bytes=5 file.txt
expect:
  stdout: "alpha"
  stderr: ""
  exit_code: 0
