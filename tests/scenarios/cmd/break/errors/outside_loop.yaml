# skip: bash returns exit code 0 for break outside a loop; rshell returns 1.
# bash error message format also differs.
skip_assert_against_bash: true
description: break outside a loop prints error to stderr, exits 1, but script continues.
input:
  script: |+
    break
    echo after
expect:
  stdout: |+
    after
  stderr: |+
    break is only useful in a loop
  exit_code: 0
