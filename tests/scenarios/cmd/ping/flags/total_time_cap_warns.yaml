# -c 20 -i 60s -W 30s gives total = 19*60 + 30 + 5 = 1175s > 120s cap.
# DNS fails immediately so the test completes in milliseconds.
description: "ping warns when total run time would exceed 120s cap"
input:
  script: |+
    ping -c 20 -i 60s -W 30s no-such-host-xyzzy.invalid
expect:
  stdout: ""
  stderr_contains: ["ping: warning: total run time capped at 120s"]
  exit_code: 1
skip_assert_against_bash: true
