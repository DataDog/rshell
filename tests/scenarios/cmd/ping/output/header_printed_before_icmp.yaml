# The PING header is printed to stdout immediately after DNS resolution,
# before any ICMP socket is opened. When ICMP times out the header is
# still visible, confirming the design choice to emit it early.
# 192.0.2.1 is a documentation-range address that never responds.
description: "ping prints PING header to stdout even when ICMP times out"
input:
  script: |+
    ping -c 1 -W 100ms 192.0.2.1
expect:
  stdout_contains: ["PING 192.0.2.1 (192.0.2.1):"]
  exit_code: 1
skip_assert_against_bash: true
