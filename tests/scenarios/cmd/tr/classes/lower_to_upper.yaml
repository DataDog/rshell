# Derived from GNU coreutils tr.pl and uutils check_against_gnu_tr_tests_upcase
description: tr translates [:lower:] to [:upper:] character class.
input:
  script: |+
    cat <<'EOF' | tr '[:lower:]' '[:upper:]'
    abcxyzABCXYZ
    EOF
expect:
  stdout: "ABCXYZABCXYZ\n"
  stderr: ""
  exit_code: 0
