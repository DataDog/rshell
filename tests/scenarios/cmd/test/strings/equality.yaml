# Derived from GNU coreutils test.pl streq tests
description: "test string equality and inequality"
input:
  script: |+
    test "t" = "t"
    echo "eq-same: $?"
    test "t" = "f"
    echo "eq-diff: $?"
    test "t" != "t"
    echo "ne-same: $?"
    test "t" != "f"
    echo "ne-diff: $?"
expect:
  stdout: |
    eq-same: 0
    eq-diff: 1
    ne-same: 1
    ne-diff: 0
  stderr: ""
  exit_code: 0
