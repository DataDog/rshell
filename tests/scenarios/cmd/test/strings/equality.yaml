# Derived from GNU coreutils test.pl streq-1..6 and strne-1..6
description: string equality and inequality operators
input:
  script: |+
    test "t" = "t" && echo eq1
    test "t" = "f" || echo eq2
    test "t" != "t" || echo ne1
    test "t" != "f" && echo ne2
    test "!" = "!" && echo eq3
    test "=" = "=" && echo eq4
expect:
  stdout: "eq1\neq2\nne1\nne2\neq3\neq4\n"
  stderr: ""
  exit_code: 0
