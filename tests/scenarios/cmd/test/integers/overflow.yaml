description: "test rejects integer overflow with exit code 2 (matches bash)"
skip_assert_against_bash: true  # bash stderr includes scriptname:line prefix
input:
  script: |+
    test 99999999999999999999 -gt 0
    echo "pos-overflow: $?"
    test -99999999999999999999 -lt 0
    echo "neg-overflow: $?"
expect:
  stdout: |
    pos-overflow: 2
    neg-overflow: 2
  stderr: |
    test: 99999999999999999999: integer expression expected
    test: -99999999999999999999: integer expression expected
  exit_code: 0
