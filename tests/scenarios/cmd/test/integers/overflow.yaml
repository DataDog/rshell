description: "test clamps integer overflow to int64 boundaries"
skip_assert_against_bash: true  # bash rejects overflow with exit code 2; rshell intentionally clamps to MaxInt64/MinInt64 matching GNU test
input:
  script: |+
    test 99999999999999999999 -gt 0
    echo "pos-overflow: $?"
    test -99999999999999999999 -lt 0
    echo "neg-overflow: $?"
expect:
  stdout: |
    pos-overflow: 0
    neg-overflow: 0
  stderr: ""
  exit_code: 0
