description: test -h returns true for a symbolic link.
setup:
  files:
    - path: target.txt
      content: "hello"
    - path: link.txt
      symlink: target.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    if [ -h link.txt ]; then echo yes; else echo no; fi
expect:
  stdout: "yes\n"
  stderr: ""
  exit_code: 0
