# Derived from uutils test_test.rs — test -d on file vs directory
description: "test -d distinguishes directories from regular files"
setup:
  files:
    - path: afile.txt
      content: "x"
input:
  allowed_paths: ["$DIR"]
  script: |+
    test -d .
    echo "dot: $?"
    test -d afile.txt
    echo "file: $?"
expect:
  stdout: |
    dot: 0
    file: 1
  stderr: ""
  exit_code: 0
skip_assert_against_bash: true
