description: "test -x succeeds on executable file, fails on non-executable."
skip_assert_against_bash: true
setup:
  files:
    - path: script.sh
      content: "#!/bin/sh"
      chmod: 0755
    - path: data.txt
      content: "data"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    test -x script.sh
    echo "exec: $?"
    test -x data.txt
    echo "noexec: $?"
expect:
  stdout: |
    exec: 0
    noexec: 1
  stdout_windows: |
    exec: 0
    noexec: 0
  stderr: ""
  exit_code: 0
