# Derived from GNU coreutils test.pl — negation with !
description: "test negation operator !"
input:
  script: |+
    test ! ""
    echo "not-empty: $?"
    test ! "hello"
    echo "not-str: $?"
    test ! -f /nonexistent
    echo "not-file: $?"
expect:
  stdout: |
    not-empty: 0
    not-str: 1
    not-file: 0
  stderr: ""
  exit_code: 0
skip_assert_against_bash: true
