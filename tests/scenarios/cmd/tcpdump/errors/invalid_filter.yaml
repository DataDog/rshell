skip_assert_against_bash: true
description: tcpdump with an invalid pcap file prints an error and exits with code 1.
setup:
  files:
    - path: notapcap.pcap
      content: "not a pcap"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    tcpdump -r notapcap.pcap
expect:
  stdout: ""
  stderr_contains: ["tcpdump:"]
  exit_code: 1
