# Live capture on a nonexistent interface fails with exit code 1.
# On any platform, opening a raw socket or BPF device for a nonexistent
# interface returns an error; the builtin reports it and exits 1.
skip_assert_against_bash: true
description: tcpdump -i with a nonexistent interface exits 1 with an error message.
input:
  script: |+
    tcpdump -i tcpdumptest-nonexistent99
expect:
  stdout: ""
  stderr_contains: ["tcpdump:"]
  exit_code: 1
