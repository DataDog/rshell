description: "find -name with [^!...] negated character class treats ! as literal after ^"
skip_assert_against_bash: true  # filesystem setup differs
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
    - path: dir/!.txt
      content: "bang"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -name '[^!]*'
expect:
  stdout: |+
    dir/a.txt
    dir/b.txt
  stderr: ""
  exit_code: 0
