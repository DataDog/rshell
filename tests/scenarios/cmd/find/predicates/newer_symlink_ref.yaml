description: -newer with symlink ref does not error when link exists.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/target.txt
      content: "target"
      chmod: 0644
    - path: dir/ref_link
      symlink: target.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -newer dir/ref_link -type f
expect:
  stderr: ""
  exit_code: 0
