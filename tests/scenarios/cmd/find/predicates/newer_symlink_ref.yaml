description: -newer with broken symlink ref succeeds in default -P mode (lstat).
skip_assert_against_bash: false
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/ref_link
      symlink: nonexistent_target
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -newer dir/ref_link -type f
expect:
  stderr: ""
  exit_code: 0
