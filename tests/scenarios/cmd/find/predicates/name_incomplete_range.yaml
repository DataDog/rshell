description: incomplete bracket range [a- matches nothing (GNU fnmatch behavior).
setup:
  files:
    - path: "dir/[a-"
      content: "x"
      chmod: 0644
    - path: dir/a.txt
      content: "y"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -name '[a-'
expect:
  stdout: ""
  exit_code: 0
