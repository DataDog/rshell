description: find -perm /0111 matches files with any execute bit set.
setup:
  files:
    - path: dir/a.sh
      content: "a"
      chmod: 0700
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -perm /0111
expect:
  stdout: |+
    dir/a.sh
  stdout_windows: ""
  stderr: ""
  exit_code: 0
