description: "find -readable excludes unreadable files (mode 0200)."
skip_assert_against_bash: true
skip_if_root: true
setup:
  files:
    - path: dir/yes.txt
      content: "yes"
      chmod: 0644
    - path: dir/no.txt
      content: "no"
      chmod: 0200
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -readable
expect:
  stdout: "dir/yes.txt\n"
  stdout_windows: "dir/no.txt\ndir/yes.txt\n"
  stderr: ""
  exit_code: 0
