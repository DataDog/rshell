description: find -type d matches only directories.
setup:
  files:
    - path: dir/file.txt
      content: "data"
      chmod: 0644
    - path: dir/sub/nested.txt
      content: "nested"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type d
expect:
  stdout_unordered: |+
    dir
    dir/sub
  stderr: ""
  exit_code: 0
