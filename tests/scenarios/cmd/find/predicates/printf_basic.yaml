description: find -printf outputs formatted file information.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "hello"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -printf '%p %s\n'
expect:
  stdout: |+
    dir/a.txt 5
  stderr: ""
  exit_code: 0
