description: find -mmin 0 does not match files that are even 1 second old (ceiling rounding).
skip_assert_against_bash: true
setup:
  files:
    - path: dir/recent.txt
      content: "just created"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -mmin 0
expect:
  stdout: ""
  stderr: ""
  exit_code: 0
