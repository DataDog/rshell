description: find -links 1 matches regular files (single link count).
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -links 1
expect:
  stdout: |+
    dir/a.txt
  stderr: ""
  exit_code: 0
