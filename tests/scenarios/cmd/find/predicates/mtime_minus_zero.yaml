description: -mtime -0 matches very fresh files (GNU find compatibility).
skip_assert_against_bash: true  # sub-second timing makes bash result non-deterministic
setup:
  files:
    - path: dir/file.txt
      content: "x"
      chmod: 0644
      mod_time: "2099-01-01T00:00:00Z"
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -maxdepth 1 -type f -mtime -0
expect:
  stdout: |+
    dir/file.txt
  exit_code: 0
