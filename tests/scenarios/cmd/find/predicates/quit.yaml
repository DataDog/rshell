description: find -quit stops after the first match.
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -print -quit
expect:
  stdout_contains:
    - ".txt"
  stderr: ""
  exit_code: 0
