description: find -readable combined with -name filters correctly.
setup:
  files:
    - path: dir/hello.txt
      content: "hello"
      chmod: 0644
    - path: dir/world.log
      content: "world"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -readable -name '*.txt'
expect:
  stdout: |+
    dir/hello.txt
  stderr: ""
  exit_code: 0
