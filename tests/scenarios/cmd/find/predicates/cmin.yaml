description: find -cmin matches files with status change within specified minutes.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/recent.txt
      content: "just created"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -cmin -60
expect:
  stdout: |+
    dir/recent.txt
  stderr: ""
  exit_code: 0
