description: find -newer with missing reference aborts walk — no stdout even with -o -true fallback.
skip_assert_against_bash: false
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -newer nonexistent.txt -o -true
expect:
  stdout: ""
  stderr_contains: ["find: 'nonexistent.txt'"]
  exit_code: 1
