description: find -mmin +0 matches recently created files (no int64 truncation of fractional seconds).
skip_assert_against_bash: true  # timing-sensitive — file age depends on test execution speed
setup:
  files:
    - path: dir/recent.txt
      content: "just created"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -mmin +0
expect:
  stdout: |+
    dir/recent.txt
  stderr: ""
  exit_code: 0
