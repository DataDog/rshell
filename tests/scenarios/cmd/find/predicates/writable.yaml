description: find -writable matches files writable by the current user.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "writable"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -writable
expect:
  stdout: |+
    dir/a.txt
  stderr: ""
  exit_code: 0
