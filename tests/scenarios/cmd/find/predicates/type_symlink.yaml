description: find -type l matches symlinks without -L.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/target.txt
      content: "target"
      chmod: 0644
    - path: dir/link.txt
      symlink: target.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type l
expect:
  stdout: |+
    dir/link.txt
  stderr: ""
  exit_code: 0
