description: find -type f matches only regular files.
setup:
  files:
    - path: dir/file.txt
      content: "data"
      chmod: 0644
    - path: dir/sub/nested.txt
      content: "nested"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f
expect:
  stdout_unordered: |+
    dir/file.txt
    dir/sub/nested.txt
  stderr: ""
  exit_code: 0
