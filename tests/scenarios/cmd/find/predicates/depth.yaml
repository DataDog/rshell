description: find -depth processes directory contents before directory itself.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/sub/file.txt
      content: "file"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -depth
expect:
  stdout: |+
    dir/sub/file.txt
    dir/sub
    dir
  stderr: ""
  exit_code: 0
