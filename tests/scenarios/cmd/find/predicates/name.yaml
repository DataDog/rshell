description: find -name matches basename glob pattern.
setup:
  files:
    - path: dir/hello.txt
      content: "hi"
      chmod: 0644
    - path: dir/world.go
      content: "go"
      chmod: 0644
    - path: dir/sub/test.txt
      content: "test"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -name '*.txt'
expect:
  stdout_unordered: |+
    dir/hello.txt
    dir/sub/test.txt
  stderr: ""
  exit_code: 0
