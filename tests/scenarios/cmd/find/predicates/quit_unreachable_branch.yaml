description: find with -quit on unreachable OR branch still prints via implicit -print.
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -true -o -quit
expect:
  stdout_contains:
    - "dir"
    - "dir/a.txt"
    - "dir/b.txt"
  stderr: ""
  exit_code: 0
