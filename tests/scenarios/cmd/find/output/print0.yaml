description: find -print0 separates entries with NUL.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -print0
expect:
  stdout: "dir/a.txt\x00dir/b.txt\x00"
  stderr: ""
  exit_code: 0
