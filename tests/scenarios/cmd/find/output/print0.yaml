description: find -print0 separates entries with NUL.
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -print0
expect:
  stdout_contains:
    - "dir/a.txt"
    - "dir/b.txt"
  stderr: ""
  exit_code: 0
