description: Explicit -print suppresses implicit print.
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -name '*.txt' -print
expect:
  stdout_unordered: |+
    dir/a.txt
    dir/b.txt
  stderr: ""
  exit_code: 0
