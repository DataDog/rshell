description: Explicit -print inside OR branches prints only matching entries.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.go
      content: "b"
      chmod: 0644
    - path: dir/c.md
      content: "c"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -name '*.txt' -print -o -name '*.go' -print
expect:
  stdout: |+
    dir/a.txt
    dir/b.go
  stderr: ""
  exit_code: 0
