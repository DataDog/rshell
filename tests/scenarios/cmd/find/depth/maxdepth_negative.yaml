description: find -maxdepth with negative value produces error.
skip_assert_against_bash: true
setup:
  files:
    - path: dummy.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -maxdepth -1
expect:
  stderr_contains: ["invalid argument '-1' to -maxdepth"]
  exit_code: 1
