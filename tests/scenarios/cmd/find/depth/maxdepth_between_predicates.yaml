description: "-maxdepth works between two predicates."
setup:
  files:
    - path: a/b/c/deep.txt
      content: "deep"
      chmod: 0644
    - path: a/b/mid.txt
      content: "mid"
      chmod: 0644
    - path: a/top.txt
      content: "top"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find a -type f -maxdepth 2 -name '*.txt'
expect:
  stdout_unordered: |+
    a/b/mid.txt
    a/top.txt
  stderr: ""
  exit_code: 0
