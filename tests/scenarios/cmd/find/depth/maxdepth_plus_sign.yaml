description: -maxdepth rejects +N form like GNU find.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -maxdepth +1
expect:
  stdout: ""
  stderr_contains: ["invalid argument"]
  exit_code: 1
