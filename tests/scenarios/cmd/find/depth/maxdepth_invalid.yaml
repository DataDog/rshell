description: find -maxdepth with non-numeric value produces error.
skip_assert_against_bash: true
setup:
  files:
    - path: dummy.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -maxdepth abc
expect:
  stderr_contains: ["invalid argument 'abc' to -maxdepth"]
  exit_code: 1
