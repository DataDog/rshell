description: "-mindepth and -maxdepth combined after predicates select an exact depth band."
skip_assert_against_bash: true
setup:
  files:
    - path: a/b/c/deep.txt
      content: "deep"
      chmod: 0644
    - path: a/b/mid.txt
      content: "mid"
      chmod: 0644
    - path: a/top.txt
      content: "top"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find a -type f -mindepth 2 -maxdepth 2
expect:
  stdout: |+
    a/b/mid.txt
  stderr: ""
  exit_code: 0
