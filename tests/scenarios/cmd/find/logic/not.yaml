description: find with ! (NOT) negates the predicate.
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.go
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f ! -name '*.txt'
expect:
  stdout: |+
    dir/b.go
  stderr: ""
  exit_code: 0
