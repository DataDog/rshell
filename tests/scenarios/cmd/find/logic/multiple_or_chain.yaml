description: Chained OR with three alternatives.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.go
      content: "b"
      chmod: 0644
    - path: dir/c.md
      content: "c"
      chmod: 0644
    - path: dir/d.rs
      content: "d"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f '(' -name '*.txt' -o -name '*.go' -o -name '*.md' ')'
expect:
  stdout: |+
    dir/a.txt
    dir/b.go
    dir/c.md
  stderr: ""
  exit_code: 0
