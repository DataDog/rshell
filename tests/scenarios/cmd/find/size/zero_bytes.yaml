description: find -size 0c matches empty files.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/empty.txt
      content: ""
      chmod: 0644
    - path: dir/notempty.txt
      content: "data"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -size 0c
expect:
  stdout: |+
    dir/empty.txt
  stderr: ""
  exit_code: 0
