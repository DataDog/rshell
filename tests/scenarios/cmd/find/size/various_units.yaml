description: find -size with negative byte count.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/empty.txt
      content: ""
      chmod: 0644
    - path: dir/small.txt
      content: "hi"
      chmod: 0644
    - path: dir/bigger.txt
      content: "hello world, how are you today?"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -size -5c
expect:
  stdout: |+
    dir/empty.txt
    dir/small.txt
  stderr: ""
  exit_code: 0
