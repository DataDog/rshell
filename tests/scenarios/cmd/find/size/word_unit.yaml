description: find -size with w suffix uses 2-byte word blocks.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/two.txt
      content: "hi"
      chmod: 0644
    - path: dir/three.txt
      content: "hey"
      chmod: 0644
    - path: dir/empty.txt
      content: ""
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -size 1w
expect:
  stdout: |+
    dir/two.txt
  stderr: ""
  exit_code: 0
