description: "find -size with G (gigabyte) unit works end-to-end."
setup:
  files:
    - path: dir/small.txt
      content: "hello"
      chmod: 0644
    - path: dir/tiny.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -size +1G
    find dir -type f -size -2G
expect:
  stdout: |+
    dir/small.txt
    dir/tiny.txt
  stderr: ""
  exit_code: 0
