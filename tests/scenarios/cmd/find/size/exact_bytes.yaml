description: find -size 2c matches files exactly 2 bytes.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/two.txt
      content: "hi"
      chmod: 0644
    - path: dir/three.txt
      content: "hey"
      chmod: 0644
    - path: dir/one.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -type f -size 2c
expect:
  stdout: |+
    dir/two.txt
  stderr: ""
  exit_code: 0
