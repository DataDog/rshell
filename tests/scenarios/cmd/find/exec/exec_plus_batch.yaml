description: "find -exec {} + runs command once with all paths"
setup:
  files:
    - path: a.txt
      content: "a"
      chmod: 0644
    - path: b.txt
      content: "b"
      chmod: 0644
    - path: c.txt
      content: "c"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name '*.txt' -exec echo {} + | tr ' ' '\n' | sort
expect:
  stdout: |
    ./a.txt
    ./b.txt
    ./c.txt
  exit_code: 0
