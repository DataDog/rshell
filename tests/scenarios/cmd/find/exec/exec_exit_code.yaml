# Test -exec returns false when command fails, suppressing implicit print
description: find -exec returns false when the executed command exits non-zero.
setup:
  files:
    - path: a.txt
      content: "alpha"
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name "a.txt" -exec false \;
    echo "exit: $?"
expect:
  stdout: "exit: 0\n"
  exit_code: 0
