# Test -exec with cat to read file contents
description: find -exec cat reads matched file contents.
setup:
  files:
    - path: hello.txt
      content: "hello world\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name "hello.txt" -exec cat {} \;
expect:
  stdout: "hello world\n"
  exit_code: 0
