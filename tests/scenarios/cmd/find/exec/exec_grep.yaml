# Test -exec with grep to search file contents
description: find -exec grep searches within matched files.
setup:
  files:
    - path: a.txt
      content: "hello world\n"
    - path: b.txt
      content: "goodbye world\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name "*.txt" -exec grep -l hello {} \; | sort
expect:
  stdout: "./a.txt\n"
  exit_code: 0
