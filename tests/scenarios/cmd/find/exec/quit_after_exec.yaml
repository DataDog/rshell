description: find -exec echo {} \; -quit runs exec exactly once then stops.
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
    - path: dir/c.txt
      content: "c"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name '*.txt' -exec echo {} \; -quit
expect:
  stdout_contains:
    - ".txt"
  stderr: ""
  exit_code: 0
