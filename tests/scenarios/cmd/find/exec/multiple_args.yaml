description: find -exec preserves argument order when extra args surround {}.
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name '*.txt' -exec echo before {} after \;
expect:
  stdout: |+
    before dir/a.txt after
  stderr: ""
  exit_code: 0
