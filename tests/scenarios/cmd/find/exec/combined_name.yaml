description: find -name filter combined with -exec only runs echo on matching files.
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.go
      content: "b"
      chmod: 0644
    - path: dir/c.txt
      content: "c"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name '*.txt' -exec echo {} \;
expect:
  stdout_unordered: |+
    dir/a.txt
    dir/c.txt
  stderr: ""
  exit_code: 0
