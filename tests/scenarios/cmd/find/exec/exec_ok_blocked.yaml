description: "find -ok remains blocked for sandbox safety"
skip_assert_against_bash: true  # intentional divergence
setup:
  files:
    - path: dummy.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -ok echo {} \;
expect:
  stderr_contains: ["blocked"]
  exit_code: 1
