# Test -exec with batch mode (+)
description: find -exec with + batches files into a single command invocation.
skip_assert_against_bash: true  # rshell -exec only runs builtins
setup:
  files:
    - path: a.txt
      content: "alpha"
    - path: b.txt
      content: "beta"
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name "*.txt" -exec echo {} + | tr ' ' '\n' | sort
expect:
  stdout: "./a.txt\n./b.txt\n"
  exit_code: 0
