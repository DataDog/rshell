description: find -exec false {} \; exits 0 even though false returns non-zero (find reports errors, not predicate results).
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:false
  script: |+
    find dir -type f -exec false {} \;
expect:
  stdout: ""
  stderr: ""
  exit_code: 0
