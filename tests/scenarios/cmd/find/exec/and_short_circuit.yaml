description: find -false -exec echo {} \; never runs echo because AND short-circuits on -false.
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -false -exec echo {} \;
expect:
  stdout: ""
  stderr: ""
  exit_code: 0
