description: "find -exec runs command for each matched file"
setup:
  files:
    - path: a.txt
      content: "hello"
      chmod: 0644
    - path: b.txt
      content: "world"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name '*.txt' -exec echo {} \; | sort
expect:
  stdout: |
    ./a.txt
    ./b.txt
  exit_code: 0
