description: find -exec with \; immediately after flag (no command) is a parse error.
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -exec \;
expect:
  stderr_contains: ["-exec"]
  exit_code: 1
