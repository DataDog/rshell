description: find -exec echo {} \; runs echo with the full relative path (no ./ prefix).
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name '*.txt' -exec echo {} \;
expect:
  stdout_unordered: |+
    dir/a.txt
    dir/b.txt
  stderr: ""
  exit_code: 0
