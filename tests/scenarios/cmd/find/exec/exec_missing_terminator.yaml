# Test -exec without terminator
description: find -exec without ; or + reports parse error.
skip_assert_against_bash: true  # different error messages
setup:
  files:
    - path: a.txt
      content: "alpha"
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -exec echo {}
expect:
  stderr_contains: ["missing terminator"]
  exit_code: 1
