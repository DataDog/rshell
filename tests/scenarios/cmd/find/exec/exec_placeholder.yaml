description: "find -exec replaces {} with the file path in any argument position"
setup:
  files:
    - path: file.txt
      content: "data"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name 'file.txt' -exec echo found {} here \;
expect:
  stdout: "found ./file.txt here\n"
  exit_code: 0
