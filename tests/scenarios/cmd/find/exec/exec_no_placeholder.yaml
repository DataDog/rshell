description: "find -exec without {} runs command for each matched file"
setup:
  files:
    - path: a.txt
      content: "a"
      chmod: 0644
    - path: b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name '*.txt' -exec echo hello \; | sort
expect:
  stdout: |
    hello
    hello
  exit_code: 0
