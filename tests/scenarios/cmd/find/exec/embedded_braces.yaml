description: find -exec replaces {} embedded in arguments like {}.bak with the full relative path.
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name 'a.txt' -exec echo {}.bak \;
expect:
  stdout: |+
    dir/a.txt.bak
  stderr: ""
  exit_code: 0
