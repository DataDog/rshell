description: find -exec replaces {} with the full relative path for files in nested subdirectories.
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external commands
setup:
  files:
    - path: dir/sub/deep.txt
      content: "deep"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name 'deep.txt' -exec echo {} \;
expect:
  stdout: |+
    dir/sub/deep.txt
  stderr: ""
  exit_code: 0
