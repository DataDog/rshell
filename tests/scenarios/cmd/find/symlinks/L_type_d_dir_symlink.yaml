description: find -L -type d matches symlink whose target is a directory.
skip_assert_against_bash: false
setup:
  files:
    - path: dir/realdir/file.txt
      content: "x"
      chmod: 0644
    - path: dir/dirlink
      symlink: realdir
input:
  allowed_paths: ["$DIR"]
  script: |+
    find -L dir -maxdepth 1 -name dirlink -type d
expect:
  stdout: |+
    dir/dirlink
  stderr: ""
  exit_code: 0
