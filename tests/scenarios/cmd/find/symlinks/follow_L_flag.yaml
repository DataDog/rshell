description: find -L follows symlinks so -type f matches through links.
setup:
  files:
    - path: dir/target.txt
      content: "target"
      chmod: 0644
    - path: dir/link.txt
      symlink: target.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    find -L dir -type f
expect:
  stdout_unordered: |+
    dir/link.txt
    dir/target.txt
  stderr: ""
  exit_code: 0
