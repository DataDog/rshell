description: find -P -mmin uses symlink mtime — recent symlink does not match large +N.
skip_assert_against_bash: false
setup:
  files:
    - path: dir/target.txt
      content: "target"
      chmod: 0644
      mod_time: "2020-06-15T00:00:00Z"
    - path: dir/link.txt
      symlink: target.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -maxdepth 1 -name link.txt -mmin +525600 -type l
expect:
  stdout: ""
  stderr: ""
  exit_code: 0
