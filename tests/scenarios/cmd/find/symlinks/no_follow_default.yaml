description: Default behavior lists symlinks as-is without following.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/target.txt
      content: "target"
      chmod: 0644
    - path: dir/link.txt
      symlink: target.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir
expect:
  stdout: |+
    dir
    dir/link.txt
    dir/target.txt
  stderr: ""
  exit_code: 0
