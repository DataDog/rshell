description: find -L -type f matches symlink whose target is a regular file.
skip_assert_against_bash: false
setup:
  files:
    - path: dir/target.txt
      content: "hello"
      chmod: 0644
    - path: dir/link.txt
      symlink: target.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    find -L dir -maxdepth 1 -name link.txt -type f
expect:
  stdout: |+
    dir/link.txt
  stderr: ""
  exit_code: 0
