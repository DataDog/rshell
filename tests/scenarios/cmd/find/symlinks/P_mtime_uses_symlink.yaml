description: find -P -mtime uses symlink mtime (recent), not target mtime (old).
skip_assert_against_bash: false
setup:
  files:
    - path: dir/target.txt
      content: "target"
      chmod: 0644
      mod_time: "2020-06-15T00:00:00Z"
    - path: dir/link.txt
      symlink: target.txt
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -maxdepth 1 -name link.txt -mtime -10 -type l
expect:
  stdout: |+
    dir/link.txt
  stderr: ""
  exit_code: 0
