description: find with multiple starting paths.
setup:
  files:
    - path: dir1/a.txt
      content: "a"
      chmod: 0644
    - path: dir2/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir1 dir2 -type f
expect:
  stdout: |+
    dir1/a.txt
    dir2/b.txt
  stderr: ""
  exit_code: 0
