description: find -execdir executes commands from the file's parent directory.
setup:
  files:
    - path: dummy.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name "dummy.txt" -execdir echo found {} \;
expect:
  stdout: "found ./dummy.txt\n"
  exit_code: 0
