description: find -exec executes commands for matched files.
skip_assert_against_bash: true  # rshell -exec only runs builtins, not external binaries
setup:
  files:
    - path: hello.txt
      content: "hello world"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -name "hello.txt" -exec echo found {} \;
expect:
  stdout: "found ./hello.txt\n"
  exit_code: 0
