description: find -type with empty string produces an error.
skip_assert_against_bash: true
setup:
  files:
    - path: dummy.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -type ""
expect:
  stderr_contains: ["Unknown argument to -type"]
  exit_code: 1
