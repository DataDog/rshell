description: find with unmatched opening parenthesis produces error.
skip_assert_against_bash: true
setup:
  files:
    - path: dummy.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . '(' -name '*.txt'
expect:
  stderr_contains: ["expected ')'"]
  exit_code: 1
