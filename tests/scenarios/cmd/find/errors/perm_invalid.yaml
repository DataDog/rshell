description: find -perm with invalid mode string reports an error.
skip_assert_against_bash: true
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find dir -perm xyz
expect:
  stdout: ""
  stderr_contains:
    - "invalid mode"
  exit_code: 1
