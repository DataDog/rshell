description: find -mtime with non-numeric value produces error.
skip_assert_against_bash: true
setup:
  files:
    - path: dummy.txt
      content: "x"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    find . -mtime foo
expect:
  stderr_contains: ["invalid argument 'foo' to -mtime"]
  exit_code: 1
