description: find -prune skips a subdirectory; -execdir only runs on files outside the pruned subtree.
skip_assert_against_bash: true  # rshell -execdir only runs builtins, not external commands
setup:
  files:
    - path: dir/sub/hidden.txt
      content: "hidden"
      chmod: 0644
    - path: dir/visible.txt
      content: "visible"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -type d -name sub -prune -o -type f -execdir echo {} \;
expect:
  stdout: |+
    ./visible.txt
  stderr: ""
  exit_code: 0
