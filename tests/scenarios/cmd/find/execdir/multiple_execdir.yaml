description: find with two consecutive -execdir actions — both run for each matched file.
skip_assert_against_bash: true  # rshell -execdir only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name '*.txt' -execdir echo first {} \; -execdir echo second {} \;
expect:
  stdout: |+
    first ./a.txt
    second ./a.txt
  stderr: ""
  exit_code: 0
