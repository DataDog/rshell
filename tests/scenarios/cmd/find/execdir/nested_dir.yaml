description: find -execdir replaces {} with ./basename even for files in nested subdirectories.
skip_assert_against_bash: true  # rshell -execdir only runs builtins, not external commands
setup:
  files:
    - path: dir/sub/deep.txt
      content: "deep"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name '*.txt' -execdir echo {} \;
expect:
  stdout: |+
    ./deep.txt
  stderr: ""
  exit_code: 0
