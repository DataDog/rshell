description: find -execdir suppresses the implicit -print action.
skip_assert_against_bash: true  # rshell -execdir only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
    - path: dir/b.txt
      content: "b"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -type f -execdir echo {} \;
expect:
  stdout_unordered: |+
    ./a.txt
    ./b.txt
  stderr: ""
  exit_code: 0
