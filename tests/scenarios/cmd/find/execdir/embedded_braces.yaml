description: find -execdir replaces {} embedded in arguments like {}.bak.
skip_assert_against_bash: true  # rshell -execdir only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -name 'a.txt' -execdir echo {}.bak \;
expect:
  stdout: |+
    ./a.txt.bak
  stderr: ""
  exit_code: 0
