description: find -execdir rejects embedded {} like {}.bak in arguments.
skip_assert_against_bash: true  # rshell -execdir only runs builtins, not external commands
setup:
  files:
    - path: dir/a.txt
      content: "a"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  allowed_commands:
    - rshell:find
    - rshell:echo
  script: |+
    find dir -execdir echo {}.bak \;
expect:
  stderr_contains: ["{}"]
  exit_code: 1
