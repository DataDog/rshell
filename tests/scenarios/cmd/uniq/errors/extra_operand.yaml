description: uniq rejects extra operand (OUTPUT argument not allowed).
setup:
  files:
    - path: a.txt
      content: "a\n"
    - path: b.txt
      content: "b\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    uniq a.txt b.txt
expect:
  stdout: ""
  stderr_contains: ["extra operand"]
  exit_code: 1
