# Derived from GNU coreutils uniq.pl test 116
description: uniq --all-repeated=prepend prepends blank line before each group.
setup:
  files:
    - path: f.txt
      content: "a\na\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    uniq --all-repeated=prepend f.txt
expect:
  stdout: "\na\na\n"
  stderr: ""
  exit_code: 0
