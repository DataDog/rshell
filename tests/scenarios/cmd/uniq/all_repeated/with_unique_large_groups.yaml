description: uniq --all-repeated --unique with groups larger than 2 prints count-1 lines per group.
setup:
  files:
    - path: input.txt
      content: "a\na\na\nb\nb\nc\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    uniq --all-repeated --unique input.txt
expect:
  stdout: "a\na\nb\n"
  stderr: ""
  exit_code: 0
