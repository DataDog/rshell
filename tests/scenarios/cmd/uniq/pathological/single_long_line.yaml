description: uniq on two identical lines of 5000 bytes (beyond the default 4096-byte scanner buffer) correctly deduplicates them to one.
setup:
  files:
    - path: file.txt
      content: "\\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    uniq file.txt
expect:
  stdout: "\n"
  stderr: ""
  exit_code: 0
