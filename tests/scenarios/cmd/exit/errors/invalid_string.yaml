skip_assert_against_bash: true
description: >
  Exit with a non-numeric string argument produces an error but does not exit.
  skip_assert_against_bash because error message format differs (bash prefixes with "bash: line N: exit:").
input:
  script: |+
    exit abc
expect:
  stdout: ""
  stderr: "abc: numeric argument required\n"
  exit_code: 2
