description: Exit --help displays usage information without exiting the shell.
skip_assert_against_bash: true  # bash outputs slightly different formatting
input:
  script: |+
    exit --help
    echo "still running"
expect:
  stdout: |+
    still running
  stderr: |+
    exit: exit [n]
        Exit the shell.

        Exits the shell with a status of N.  If N is omitted, the exit status
        is that of the last command executed.
  exit_code: 0
