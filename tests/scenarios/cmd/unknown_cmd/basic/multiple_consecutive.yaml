description: Multiple unknown commands on separate lines all execute and report errors.
input:
  allowed_commands: ["foo", "bar", "baz"]
  script: |+
    foo
    bar
    baz
expect:
  stdout: ""
  stderr_contains:
    - "foo: command not found"
    - "bar: command not found"
    - "baz: command not found"
  exit_code: 127
