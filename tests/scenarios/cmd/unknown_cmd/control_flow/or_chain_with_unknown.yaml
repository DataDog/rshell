description: Unknown command in logical OR chain falls through to the next command.
input:
  allowed_commands: ["echo", "nonexistent_cmd"]
  script: |+
    nonexistent_cmd || echo "recovered"
    echo $?
expect:
  stdout: |+
    recovered
    0
  stderr_contains:
    - "nonexistent_cmd: command not found"
  exit_code: 0
