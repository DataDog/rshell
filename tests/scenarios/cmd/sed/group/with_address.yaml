description: Group commands with line address ranges.
setup:
  files:
    - path: input.txt
      content: "line1\nline2\nline3\nline4\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed '2,3{ s/line/LINE/; s/$/!/; }' input.txt
expect:
  stdout: "line1\nLINE2!\nLINE3!\nline4\n"
  stderr: ""
  exit_code: 0
