description: Sed reports an error for a non-existent input file.
setup:
  files:
    - path: dummy.txt
      content: ""
# skip: rshell builtin error/output format differs from GNU coreutils
skip_assert_against_bash: true
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed 's/a/b/' nonexistent.txt
expect:
  stdout: ""
  stderr_contains: ["nonexistent.txt"]
  exit_code: 1
