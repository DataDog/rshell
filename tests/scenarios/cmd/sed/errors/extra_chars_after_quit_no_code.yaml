description: Extra characters after q command without exit code are rejected.
setup:
  files:
    - path: input.txt
      content: "line1\nline2\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed 'qp' input.txt
expect:
  stdout: ""
  stderr_contains: ["extra characters after command"]
  exit_code: 1
