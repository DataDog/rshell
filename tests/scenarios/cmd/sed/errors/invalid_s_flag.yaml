description: "Unknown flags in s/// are rejected as errors."
setup:
  files:
    - path: input.txt
      content: "abc\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed 's/a/b/z' input.txt
skip_assert_against_bash: true
expect:
  stdout: ""
  stderr_contains: ["unknown option to 's' command"]
  exit_code: 1
