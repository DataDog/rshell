description: "The n command resets subMade so t/T branch correctly after reading a new line."
setup:
  files:
    - path: input.txt
      content: "a\nb\nc\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed -n -e 's/a/x/' -e 'n' -e 't end' -e 'p' -e ':end' input.txt
expect:
  stdout: "b\n"
  stderr: ""
  exit_code: 0
