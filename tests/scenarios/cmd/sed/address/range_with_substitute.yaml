description: Sed address range applies substitution only to lines within the range.
setup:
  files:
    - path: input.txt
      content: "aaa\nbbb\nccc\nddd\neee\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed '2,4s/./X/g' input.txt
expect:
  stdout: "aaa\nXXX\nXXX\nXXX\neee\n"
  stderr: ""
  exit_code: 0
