description: Regex address applies command to matching lines.
setup:
  files:
    - path: input.txt
      content: "apple\nbanana\napricot\ncherry\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed '/^a/s/a/A/' input.txt
expect:
  stdout: "Apple\nbanana\nApricot\ncherry\n"
  stderr: ""
  exit_code: 0
