description: sed on a single line of 5000 bytes (beyond the default 4096-byte scanner buffer) passes it through correctly when the pattern does not match.
setup:
  files:
    - path: file.txt
      content: "\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed 's/b/c/' file.txt
expect:
  stdout: "\n"
  stderr: ""
  exit_code: 0
