description: The t command branches only if a substitution was made.
setup:
  files:
    - path: input.txt
      content: "foo bar\nhello world\nfoo baz\n"
input:
  allowed_paths: ["$DIR"]
  script: |+
    sed 's/foo/FOO/; t done; s/hello/HELLO/; :done' input.txt
expect:
  stdout: "FOO bar\nHELLO world\nFOO baz\n"
  stderr: ""
  exit_code: 0
