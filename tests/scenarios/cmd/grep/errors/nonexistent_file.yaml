skip_assert_against_bash: true
description: grep on a nonexistent file prints an error to stderr and exits with code 2.
input:
  allowed_paths: ["$DIR"]
  script: |+
    grep foo nonexistent.txt
expect:
  stdout: ""
  stderr_contains:
    - "grep: nonexistent.txt:"
    - "no such file or directory"
  exit_code: 2
