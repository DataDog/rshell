description: grep on a binary file where the matching line is near the start but the NUL byte is beyond 512 bytes (at offset 541) still produces no stdout output. This validates that the binary probe window is large enough to cover the NUL before the scan loop starts.
setup:
  files:
    - path: file.txt
      content: "match_here\\x00\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    grep match file.txt
expect:
  stdout: ""
  stderr: "grep: file.txt: binary file matches\n"
  exit_code: 0
