description: grep -l prints only filenames of files with matches.
setup:
  files:
    - path: a.txt
      content: |+
        foo
      chmod: 0644
    - path: b.txt
      content: |+
        bar
      chmod: 0644
    - path: c.txt
      content: |+
        foo bar
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    grep -l foo a.txt b.txt c.txt
expect:
  stdout: |+
    a.txt
    c.txt
  stderr: ""
  exit_code: 0
