description: grep -h suppresses filename prefix even for multiple files.
setup:
  files:
    - path: a.txt
      content: |+
        foo
      chmod: 0644
    - path: b.txt
      content: |+
        foo
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    grep -h foo a.txt b.txt
expect:
  stdout: |+
    foo
    foo
  stderr: ""
  exit_code: 0
