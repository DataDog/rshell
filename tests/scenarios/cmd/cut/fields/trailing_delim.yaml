# Derived from GNU coreutils cut.pl test d
description: Cut with -s selects non-adjacent fields from a line with trailing delimiter.
setup:
  files:
    - path: input.txt
      content: "a:b:c:\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    cut -s -d: -f1,3 input.txt
expect:
  stdout: "a:c\n"
  stderr: ""
  exit_code: 0
