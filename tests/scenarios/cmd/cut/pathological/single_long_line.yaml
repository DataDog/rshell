description: cut on a single line of 5000 bytes (beyond the default 4096-byte scanner buffer) correctly extracts the first 5 characters.
setup:
  files:
    - path: file.txt
      content: "\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    cut -c 1-5 file.txt
expect:
  stdout: "xxxxx\n"
  stderr: ""
  exit_code: 0
