# Derived from GNU coreutils cut.pl newline-5 test
description: Cut extracts second field from each line of a multiline delimited file.
setup:
  files:
    - path: input.txt
      content: "a:1\nb:2\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    cut -d: -f2 input.txt
expect:
  stdout: "1\n2\n"
  stderr: ""
  exit_code: 0
