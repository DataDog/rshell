# Derived from GNU coreutils cut.pl out-delim1 test
description: Cut inserts output delimiter between non-adjacent byte ranges.
setup:
  files:
    - path: input.txt
      content: "abcdefg\n"
      chmod: 0644
input:
  allowed_paths: ["$DIR"]
  script: |+
    cut -c1-3,5- --output-delimiter=: input.txt
expect:
  stdout: "abc:efg\n"
  stderr: ""
  exit_code: 0
